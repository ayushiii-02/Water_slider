<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Water Fold Effect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0ee; }
    canvas { display: block; }
    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #scroll-spacer {
      position: relative;
      z-index: 0;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="scroll-spacer"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
